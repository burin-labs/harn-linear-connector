name: CI

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  harn:
    name: Harn
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read Harn version
        id: harn-version
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < .harn-version)"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Install harn-cli
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.harn-version.outputs.version }}"
          harn_root="${HOME}/.harn-cli/${version}"
          if [[ ! -x "${harn_root}/bin/harn" ]]; then
            mkdir -p "${harn_root}/bin"
            curl -fsSL \
              -o "${RUNNER_TEMP}/harn.tar.gz" \
              "https://github.com/burin-labs/harn/releases/download/v${version}/harn-x86_64-unknown-linux-gnu.tar.gz"
            tar -xzf "${RUNNER_TEMP}/harn.tar.gz" -C "${harn_root}/bin"
          fi
          echo "${harn_root}/bin" >> "${GITHUB_PATH}"

      - name: Show Harn version
        run: harn --version

      - name: Connector package gate
        shell: bash
        run: |
          set -euo pipefail
          harn connector test "$GITHUB_WORKSPACE" --provider linear
